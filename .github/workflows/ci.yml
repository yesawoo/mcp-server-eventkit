name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & TypeCheck
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: TypeCheck
        run: bun run typecheck

  test:
    name: Test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test

  build:
    name: Build
    runs-on: macos-latest
    needs: [lint-and-typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: bun install

      - name: Build Swift bridge
        run: bun run build:swift

      - name: Build binary
        run: bun run build:binary

      - name: Validate mcpb manifest
        run: npx @anthropic-ai/mcpb@latest validate manifest.json

      - name: Pack mcpb extension
        run: npx @anthropic-ai/mcpb@latest pack . build/mcp-eventkit.mcpb

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcp-eventkit-binary
          path: build/mcp-eventkit

      - name: Upload mcpb extension
        uses: actions/upload-artifact@v4
        with:
          name: mcp-eventkit.mcpb
          path: build/mcp-eventkit.mcpb
